<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MichieCRM Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" v-cloak class="p-6 max-w-6xl mx-auto">
        <div v-if="!isLoggedIn" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold mb-6 text-center">MichieCRM Admin</h2>
            <input type="password" v-model="apiKey" placeholder="Admin API Key" class="w-full border p-3 rounded-lg mb-4">
            <button @click="login" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">Login</button>
            <p v-if="error" class="text-red-500 text-center mt-4">{{ error }}</p>
        </div>

        <div v-else>
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">MichieCRM Management</h1>
                <div class="space-x-4">
                    <button @click="tab = 'leads'" :class="tab === 'leads' ? 'bg-blue-600 text-white' : 'bg-white'" class="px-4 py-2 rounded-lg border">Jobs & Leads</button>
                    <button @click="tab = 'customers'" :class="tab === 'customers' ? 'bg-blue-600 text-white' : 'bg-white'" class="px-4 py-2 rounded-lg border">Customers</button>
                    <button @click="logout" class="bg-gray-200 px-4 py-2 rounded-lg">Logout</button>
                </div>
            </div>

            <div v-if="tab === 'leads'" class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr><th class="p-4">Date</th><th class="p-4">Customer</th><th class="p-4">Vehicle</th><th class="p-4">Status</th></tr>
                    </thead>
                    <tbody>
                        <tr v-for="lead in leads" class="border-b hover:bg-gray-50">
                            <td class="p-4">{{ lead.appointment_date }}</td>
                            <td class="p-4 font-medium">{{ lead.customer_name }}</td>
                            <td class="p-4">{{ lead.vehicle_year }} {{ lead.vehicle_make }}</td>
                            <td class="p-4"><span class="px-2 py-1 bg-yellow-100 rounded-full text-xs">{{ lead.status }}</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE_URL = 'https://michie-detailing-backend.onrender.com';

        createApp({
            setup() {
                const apiKey = ref(localStorage.getItem('crmApiKey') || '');
                const isLoggedIn = ref(false);
                const leads = ref([]);
                const tab = ref('leads');
                const error = ref('');

                const login = async () => {
                    error.value = '';
                    const res = await fetch(`${API_BASE_URL}/admin/leads`, {
                        headers: { 'Authorization': `Bearer ${apiKey.value}` }
                    });
                    if (res.ok) {
                        leads.value = await res.json();
                        isLoggedIn.value = true;
                        localStorage.setItem('crmApiKey', apiKey.value);
                    } else {
                        error.value = 'Invalid API Key';
                    }
                };

                const logout = () => { localStorage.removeItem('crmApiKey'); location.reload(); };

                onMounted(() => { if (apiKey.value) login(); });

                return { apiKey, isLoggedIn, leads, tab, error, login, logout };
            }
        }).mount('#app');
    </script>
</body>
</html>
